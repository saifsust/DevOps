apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: {{ .Values.frontend.virtualService.name }}
  namespace: {{ .Values.targetNamespace }}
spec:
  hosts:
    - {{ .Values.frontend.host }}
  gateways:
    - {{ .Values.frontend.gateway.name }}
  http:
    - name: {{ .Values.frontend.virtualService.http.name }}
      match:
        - uri:
            prefix: "/"
      route:
        - destination:
            host: {{ .Values.frontend.frontendDNS }}
            subset: {{ .Values.frontend.destinationRule.subset.name }}