apiVersion: v1
kind: Service
metadata:
  name: {{.Values.service.name}}
  namespace: {{.Values.namespace}}
spec:
  selector:
      app: {{.Values.selector}}
  type: {{.Values.service.type}}
  ports:
    - port: {{.Values.service.port}}
      targetPort: {{.Values.service.targetPort}}
      name: http
      {{ if .Values.service.nodePort }}
      nodePort: {{.Values.service.nodePort}}
      {{end}}
