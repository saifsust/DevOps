server {
    listen 80;
    server_name argocd.uddom.com;

    resolver 10.96.0.10 valid=5s ipv6=off;

    location / {

        proxy_pass https://argocd-server.argo-system.svc.cluster.local:443;

        proxy_ssl_verify off;
        proxy_ssl_server_name on;
        proxy_ssl_name argocd-server.argo-system.svc.cluster.local;
        proxy_ssl_session_reuse off;

        proxy_http_version 1.1;

        proxy_set_header Host argocd.uddom.com;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_buffering off;
    }
}

