apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: production-pool
  namespace: metallb-system
spec:
  addresses:
    - 192.168.0.200-192.168.0.254
  autoAssign: true # Automatically assigns IPs from this pool to LoadBalancer services
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: l2-advertisement
  namespace: metallb-system
spec:
  ipAddressPools:
    - production-pool # Explicitly links this advertisement to your pool
----
# metallb-values.yaml
controller:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      # Select the namespace where your Prometheus Operator is running
      namespace: ""
      # Add labels if your Prometheus instance filters ServiceMonitors by labels
      additionalLabels:
        release: prometheus-stack

speaker:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      namespace: ""
      additionalLabels:
        release: prometheus-stack
