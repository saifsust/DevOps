apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: {{ .Values.vs.name }}
  namespace: {{ .Values.appNamespace }}
spec:
  hosts:
    - {{ .Values.host | quote }}
  gateways:
    - {{ .Values.gateway.name }}
  http:
    - route:
        - destination:
            host: {{ printf "%s.%s.%s" .Values.service.name .Values.appNamespace .Values.service.domain }}
            subset: {{ .Values.dr.subset.name }}
      match:
        - url:
            prefix: "/login"
        - url:
            prefix: "/logout"
        - url:
            prefix: "/productpage"
        - url:
            prefix: "/api/v1/products"
        - url:
            prefix: "/metrics"