appName: review-app
appNamespace: istio-stg

configMap:
  name: review-app-conf
  enableRating:
    key: ENABLE_RATINGS
    value: "true"
  starColor:
    key: STAR_COLOR
    value: "red"
  ratingHostName:
    key: RATINGS_HOSTNAME
    value: "ratings-app-v3-svc"
  serviceDomain:
    key: SERVICES_DOMAIN
    value: "istio-stg.svc.cluster.local"
  ratingServicePort:
    key: RATINGS_SERVICE_PORT
    value: "9080"

service:
  name: review-app-svc
  type: NodePort
  nodePort: 31109

deployment:
  maxSurge: 40%
  maxUnavailable: 10%
  replicaCount: 1
  pod:
    label: review-app
    version: "istio"
    port: 9080