appName: book-rating-app-v3
appNamespace: istio-stg

configMap:
  name: book-rating-app-v3-conf
  serverVersion:
    key: SERVICE_VERSION
    value: "v3"
  url:
    key: MONGO_DB_URL
    value: "mongodb://mongodb-app-svc.istio-stg.svc.cluster.local:27017/test"

deployment:
  maxSurge: 40%
  maxUnavailable: 10%
  replicaCount: 0
  pod:
    label: book-rating-app
    generation: "v3"
    version: "istio"
    port: 9080
