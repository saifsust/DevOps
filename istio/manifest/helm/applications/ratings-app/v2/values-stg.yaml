appName: book-rating-app-v2
appNamespace: istio-stg

configMap:
  name: book-rating-app-v2-conf
  serverVersion:
    key: SERVICE_VERSION
    value: v2
  dbType:
    key: DB_TYPE
    value: mysql
  url:
    key: MYSQL_DB_HOST
    value: book-mysql-svc.istio-stg.svc.cluster.local
  port:
    key: MYSQL_DB_PORT
    value: 3306

secret:
  name: book-rating-app-v2-secret
  username:
    key: MYSQL_DB_USER
    value: cm9vdA==
  password:
    key: MYSQL_DB_PASSWORD
    value: cGFzc3dvcmQ=

deployment:
  maxSurge: 40%
  maxUnavailable: 10%
  replicaCount: 1
  pod:
    label: book-rating-app
    generation: v2
    version: istio
    port: 9080
