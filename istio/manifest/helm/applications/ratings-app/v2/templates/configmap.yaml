apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.configMap.name }}
  namespace: {{ .Values.appNamespace }}
data:
  {{ .Values.configMap.serverVersion.key }} : {{ .Values.configMap.serverVersion.value }}
  {{ .Values.configMap.dbType.key }} : {{ .Values.configMap.dbType.value }}
  {{ .Values.configMap.url.key  }} : {{ printf "%s.%s.%s" .Values.configMap.url.hostService .Values.appNamespace .Values.configMap.url.domain }}
  {{ .Values.configMap.port.key }} : {{ .Values.configMap.port.value | quote}}