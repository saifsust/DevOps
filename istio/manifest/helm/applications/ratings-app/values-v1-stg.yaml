appName: book-rating-app-v2
appNamespace: istio-stg

configMap:
  name: book-rating-app-v1-conf
  serverVersion:
    key: SERVICE_VERSION
    value: "v1"
  url:
    key: MONGO_DB_URL
    value: "mongodb://mongodb-app-svc.istio-stg.svc.cluster.local:27017/test"

secret:
  name: book-rating-app-v2-secret
  username:
    key: MYSQL_DB_USER
    value: "root"
  password:
    key: MYSQL_DB_PASSWORD
    value: "password"

service:
  name: book-rating-svc
  type: ClusterIP
  #nodePort: 31108

deployment:
  maxSurge: 40%
  maxUnavailable: 10%
  replicaCount: 1
  pod:
    label: book-rating-app
    generation: "v1"
    version: "istio"
    port: 9080
