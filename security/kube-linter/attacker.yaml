apiVersion: v1
kind: ServiceAccount
automountServiceAccountToken: false
metadata:
  name: attacker-sa
  namespace: cks
---
apiVersion: v1
kind: Pod
metadata:
  name: attacker
  namespace: cks
  annotations:
    container.seccomp.security.alpha.kubernetes.io/pod: runtime/default
    container.apparmor.security.beta.kubernetes.io/attacker: runtime/default
spec:
  automountServiceAccountToken: false
  serviceAccountName: attacker-sa
  containers:
    - image: hashicorp/http-echo:1.0
      imagePullPolicy: IfNotPresent
      name: attacker
      resources:
        limits:
          cpu: 1000m
          memory: 1Gi
        requests:
          cpu: 500m
          memory: 512Mi
      securityContext:
        runAsNonRoot: true
        runAsUser: 65551
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
          add:
            - NET_BIND_SERVICE
        appArmorProfile:
          type: RuntimeDefault
        seccompProfile:
          type: RuntimeDefault