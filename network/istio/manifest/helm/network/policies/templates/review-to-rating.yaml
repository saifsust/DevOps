apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: review-to-rating
  namespace: {{ .Values.appNamespace }}
spec:
  endpointSelector:
    matchLabels:
      app: {{ .Values.network.review }}
  egress:
    - toEndpoints:
        - matchLabels:
            app: {{ .Values.network.rating }}
      toPorts:
        - ports:
            - port: "9080"
              protocol: TCP