- rule: passwd_read
  desc: >
    password read suspicious activities detected within container
  condition: >
    container.id != host and
    evt.type in (open, openat) and
    evt.dir = < and
    fd.name = '/etc/passwd'
  output: >
    Risky suspicious actions detected within |
    time=%evt.time,container-name=%container.name,user-uid=%user.uid,repos=%container.image.repo,namespace=%k8s.ns.name,pod-name=%k8s.pod.name
  tags: [WARNING]
  priority: WARNING