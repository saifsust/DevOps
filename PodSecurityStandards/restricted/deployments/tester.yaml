apiVersion: v1
items:
- apiVersion: apps/v1
  kind: Deployment
  metadata:
    labels:
      app: tester
    name: tester
    namespace: cks
  spec:
    replicas: 2
    selector:
      matchLabels:
        app: tester
    template:
      metadata:
        labels:
          app: tester
      spec:
        containers:
        - image: saifsust/non-privileged-nginx:stable
          imagePullPolicy: Always
          name: nginx
          ports:
          - containerPort: 8080
            protocol: TCP
          resources: {}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              add:
              - NET_BIND_SERVICE
              drop:
              - ALL
            seccompProfile:
              type: RuntimeDefault
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          volumeMounts:
          - mountPath: /usr/share/nginx/html
            name: projected
            readOnly: true
          - mountPath: /var/run/secrets/kubernetes.io/serviceaccount/
            name: projected
            readOnly: true
        dnsPolicy: ClusterFirst
        restartPolicy: Always
        schedulerName: default-scheduler
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001
        serviceAccount: tester
        serviceAccountName: tester
        terminationGracePeriodSeconds: 30
        volumes:
        - name: projected
          projected:
            defaultMode: 420
            sources:
            - serviceAccountToken:
                expirationSeconds: 86400
                path: token
            - configMap:
                items:
                - key: index.html
                  path: index.html
                name: nginx-conf
- apiVersion: v1
  kind: Service
  metadata:
    labels:
      app: tester
    name: tester-svc
    namespace: cks
  spec:
    ports:
    - port: 8080
      protocol: TCP
      targetPort: 8080
    selector:
      app: tester
- apiVersion: v1
  data:
    index.html: |
      Hi, You'r seeing frontend APP view
  kind: ConfigMap
  metadata:
    name: nginx-conf
    namespace: cks
kind: List
metadata:
  resourceVersion: ""
