apiVersion: apiserver.config.k8s.io/v1
kind: AdmissionConfiguration
plugins:
- name: EventRateLimit
  path: /etc/kubernetes/apiserver/webhook/event-rate-limit.yaml
- name: PodSecurity
  configuration:
    apiVersion: pod-security.admission.config.k8s.io/v1
    kind: PodSecurityConfiguration
    defaults:
     enforce: "restricted"
     enforce-version: "latest"
     audit: "restricted"
     audit-version: "latest"
     warn: "restricted"
     warn-version: "latest"
    exemptions:
     usernames: []
     runtimeClasses: []
     namespaces: ["kube-system", "gatekeeper-system", "istio-system"] 
