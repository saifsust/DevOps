apiVersion: networking.istio.io/v1
kind: Gateway
metadata:
  name: {{ .Values.gateway.name }}
  namespace: {{ .Values.appNamespace }}
spec:
  selector:
    app: istio-ingressgateway
  servers:
#    - port:
#        number: {{ .Values.service.port }}
#        name: http
#        protocol: HTTP
#      hosts:
#        - {{ .Values.host | quote }}
    - port:
        number: {{ .Values.service.port }}
        name: https
        protocol: HTTPS
      hosts:
        - {{ .Values.host | quote }}
      tls:
        mode: SIMPLE
        credentialName: webhook-credentials