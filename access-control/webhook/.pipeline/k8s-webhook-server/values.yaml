  type: NodePort
  nodePort: 31002
  ssl:
    port: 443
    nodePort: 31443

deployment:
  replicaCount: 1
  maxUnavailable: 10%
  maxSurge: 50%
  pod:
    label: webhook-server-app
    port: 8081
    version: 1.3.99