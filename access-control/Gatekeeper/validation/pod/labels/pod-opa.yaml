apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: podaccesscontrol
spec:
 crd:
    spec:
      names:
        kind: PodAccessControl
      validation:
        openAPIV3Schema:
           type: object
           properties:
              labels:
                type: object
                properties:
                  app:
                   type: string
                  env: 
                   type: string
 targets:
 - target: admission.k8s.gatekeeper.sh
   rego: |
    package podaccesscontrol
    
    violation[{"msg": msg}]{
       provided := input.review.object.metadata.labels
       required := input.parameters.labels
       not matchApp(provided, required)
       msg := sprintf("You must provide labels %v", [required.app])
    }
    
    matchApp(provided, required){
       provided.app == required.app
    }
   
    violation[{"msg": msg}]{
     provided := input.review.object.metadata.labels
     required := input.parameters.labels
     not matchEnv(provided, required)
     msg := sprintf("You must provided labels %v", [required.env])
    }
    
    matchEnv(provided, required){
     provided.env == required.env
    }