apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
 name: requirednamespace
spec:
 crd:
  spec:
    names:
      kind: RequiredNamespace
    validation:
      openAPIV3Schema:
        type: object
        properties:
          namespace:
            type: string
 targets:
 - target: admission.k8s.gatekeeper.sh
   rego: |
    package requirednamespace
    
    violation[{"msg": msg}]{
      provided := input.review.object.metadata.namespace
      required := input.parameters.namespace
      not is_match(provided, required)
      msg := sprintf("You must provided namespace %v", [required])
    }
   
    is_match(provided, required){
      provided == required
    }